<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Customer Profile</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <style>
        body {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            min-height: 100vh;
        }
        .profile-card {
            width: 100%;
            max-width: 420px;
            position: relative;
            overflow: hidden;
            border-radius: 20px;
            box-shadow: var(--glass-shadow);
        }
        .profile-header {
            height: 140px;
            background: linear-gradient(135deg, var(--primary-color), #8e44ad);
            margin: -30px -30px 50px -30px;
            border-radius: 20px 20px 0 0;
            position: relative;
        }
        .profile-img {
            position: absolute;
            top: 70px;
            left: 50%;
            transform: translateX(-50%);
            width: 120px;
            height: 120px;
            border-radius: 50%;
            object-fit: cover;
            border: 5px solid var(--card-bg);
            background: var(--card-bg);
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }
        .info-item {
            display: flex;
            align-items: center;
            margin-bottom: 12px;
            text-align: left;
            padding: 12px 15px;
            background: rgba(0,0,0,0.03);
            border-radius: 12px;
            transition: all 0.3s ease;
        }
        .info-item:hover {
            transform: translateX(5px);
            background: rgba(0,0,0,0.05);
        }
        [data-theme="dark"] .info-item {
            background: rgba(255,255,255,0.05);
        }
        [data-theme="dark"] .info-item:hover {
            background: rgba(255,255,255,0.08);
        }
        .info-icon {
            width: 45px;
            height: 45px;
            border-radius: 50%;
            background: rgba(78, 115, 223, 0.1);
            color: var(--primary-color);
            display: flex;
            align-items: center;
            justify-content: center;
            margin-right: 15px;
            font-size: 1.3rem;
            flex-shrink: 0;
        }
        .info-content p {
            margin-bottom: 0;
            font-size: 0.85rem;
            color: var(--text-color);
            opacity: 0.7;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .info-content h6 {
            margin-bottom: 0;
            font-weight: 600;
            font-size: 1rem;
            word-break: break-word;
        }
    </style>
</head>
<body>

    <!-- Main Profile Card -->
    <div class="glass-card profile-card p-4 text-center" id="profileCard" style="display: none;">
        <div class="profile-header">
            <button class="btn btn-sm btn-light position-absolute top-0 end-0 m-3 shadow-sm rounded-circle" style="z-index: 10; width: 35px; height: 35px;" id="theme-toggle"><i class="bi bi-moon"></i></button>
        </div>
        <img src="" alt="Profile" class="profile-img" id="p-img">
        
        <div style="margin-top: 50px;">
            <h3 class="mb-1 fw-bold" id="p-name">Loading...</h3>
            <p class="text-muted mb-4 fs-5" id="p-company"></p>
            
            <div class="info-list mt-4">
                <a href="#" class="text-decoration-none text-body" id="link-mobile">
                    <div class="info-item">
                        <div class="info-icon"><i class="bi bi-telephone-fill"></i></div>
                        <div class="info-content">
                            <p>Mobile</p>
                            <h6 id="p-mobile">...</h6>
                        </div>
                    </div>
                </a>
                
                <a href="#" class="text-decoration-none text-body" id="link-email">
                    <div class="info-item">
                        <div class="info-icon"><i class="bi bi-envelope-fill"></i></div>
                        <div class="info-content">
                            <p>Email</p>
                            <h6 id="p-email">...</h6>
                        </div>
                    </div>
                </a>

                <div class="info-item">
                    <div class="info-icon"><i class="bi bi-geo-alt-fill"></i></div>
                    <div class="info-content">
                        <p>Address</p>
                        <h6 id="p-address">...</h6>
                    </div>
                </div>
            </div>

            <div class="mt-4 text-start bg-light p-3 rounded-3 border" id="notes-container" style="display: none;">
                <h6 class="fw-bold mb-2 text-primary"><i class="bi bi-info-circle me-1"></i> About</h6>
                <p id="p-notes" class="text-muted mb-0" style="font-size: 0.95rem;">...</p>
            </div>

            <div class="d-flex justify-content-center mt-4 gap-2">
                <button class="btn btn-primary w-50 rounded-pill py-2 fw-semibold shadow-sm" onclick="shareProfile()"><i class="bi bi-share me-1"></i> Share</button>
                <button class="btn btn-outline-primary w-50 rounded-pill py-2 fw-semibold" onclick="saveContact()"><i class="bi bi-person-lines-fill me-1"></i> Save</button>
            </div>
        </div>
    </div>

    <!-- Error State -->
    <div class="glass-card p-5 text-center" id="errorCard" style="display: none; max-width: 400px; width: 100%;">
        <div class="mb-4">
            <i class="bi bi-exclamation-triangle-fill text-danger" style="font-size: 4rem;"></i>
        </div>
        <h4 class="fw-bold">Profile Not Found</h4>
        <p class="text-muted mb-4">The requested digital business card does not exist or has been removed by the administrator.</p>
        <button class="btn btn-primary" onclick="window.history.back()">Go Back</button>
    </div>

    <!-- Bootstrap & JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/script.js"></script>
</body>
</html>
